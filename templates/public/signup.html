{% extends 'public/base.html' %}
{% load static %}

{% block title %}Sign Up - Delta Ops{% endblock %}

{% block content %}
<div class="auth-page">
    <!-- Background -->
    <div class="auth-bg">
        <img src="{% static 'images/flood-hero.jpg' %}" alt="Flood landscape" class="auth-bg-image">
        <div class="auth-overlay"></div>
    </div>

    <!-- Auth Container -->
    <div class="auth-container">
        <!-- Auth Card -->
        <div class="auth-card glass">
            <!-- Logo -->
            <a href="/" class="auth-logo">
                <div class="logo-icon">
                    <i data-lucide="waves" class="icon"></i>
                </div>
                <span class="logo-text">Delta Ops</span>
            </a>

            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Join Delta Ops to protect your community</p>

            <!-- Form -->
            <form class="auth-form" method="POST" action="{% url 'signup' %}">
                {% csrf_token %}

                <div class="form-group">
                    <label for="fullname" class="form-label">
                        <i data-lucide="user" class="label-icon"></i>
                        Full Name
                    </label>
                    <input type="text" id="fullname" name="fullname" class="form-input"
                        placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">
                        <i data-lucide="mail" class="label-icon"></i>
                        Email Address
                    </label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="Enter your email"
                        required>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">
                        <i data-lucide="lock" class="label-icon"></i>
                        Password
                    </label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" name="password" class="form-input"
                            placeholder="Create a password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('password')">
                            <i data-lucide="eye" class="toggle-icon" id="passwordIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword" class="form-label">
                        <i data-lucide="shield" class="label-icon"></i>
                        Confirm Password
                    </label>
                    <div class="password-input-wrapper">
                        <input type="password" id="confirmPassword" name="confirm_password" class="form-input"
                            placeholder="Confirm your password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">
                            <i data-lucide="eye" class="toggle-icon" id="confirmPasswordIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="form-checkbox">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms" class="checkbox-label">
                        I agree to the <a href="#" class="auth-link">Terms of Service</a> and <a href="#"
                            class="auth-link">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-full">
                    <i data-lucide="user-plus" class="btn-icon"></i>
                    Create Account
                </button>
            </form>

            <p class="auth-footer">
                Already have an account?
                <a href="{% url 'signin' %}" class="auth-link">Sign in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
