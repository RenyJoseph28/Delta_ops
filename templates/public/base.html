{% load static %}
<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Delta Ops - Advanced flood management system providing real-time monitoring, early warnings, and location tracking to protect communities from flood disasters.">
    <title>{% block title %}Delta Ops - Advanced Flood Management System{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">

    {% block extra_css %}{% endblock %}
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar glass">
        <div class="navbar-container">
            <!-- Logo -->
            <a href="/" class="navbar-logo">
                <div class="logo-icon">
                    <i data-lucide="waves" class="icon"></i>
                </div>
                <span class="logo-text">Delta Ops</span>
            </a>

            <!-- Desktop Navigation -->
            <div class="navbar-links">
                <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
                    <i data-lucide="home" class="nav-icon"></i>
                    Home
                </a>
                <a href="{% url 'signin' %}" class="nav-link {% if request.path == '/signin/' %}active{% endif %}">
                    <i data-lucide="log-in" class="nav-icon"></i>
                    Sign In
                </a>
                <a href="{% url 'signup' %}" class="nav-link {% if request.path == '/signup/' %}active{% endif %}">
                    <i data-lucide="user-plus" class="nav-icon"></i>
                    Sign Up
                </a>
            </div>

            <!-- Mobile Menu Button -->
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <i data-lucide="menu" class="icon menu-icon"></i>
                <i data-lucide="x" class="icon close-icon" style="display: none;"></i>
            </button>
        </div>

        <!-- Mobile Menu -->
        <div class="mobile-menu" id="mobileMenu">
            <a href="/" class="mobile-nav-link {% if request.path == '/' %}active{% endif %}">
                <i data-lucide="home" class="nav-icon"></i>
                Home
            </a>
            <a href="{% url 'signin' %}" class="mobile-nav-link {% if request.path == '/signin/' %}active{% endif %}">
                <i data-lucide="log-in" class="nav-icon"></i>
                Sign In
            </a>
            <a href="{% url 'signup' %}" class="mobile-nav-link {% if request.path == '/signup/' %}active{% endif %}">
                <i data-lucide="user-plus" class="nav-icon"></i>
                Sign Up
            </a>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <script src="{% static 'js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}

    <!-- Auto close messages after 4 seconds -->
    <script>
        // Auto-close messages after 4 seconds
        setTimeout(() => {
            const messages = document.querySelector('.messages-container');
            if (messages) {
                messages.style.display = 'none';
            }
        }, 4000);
    </script>

</body>

</html>
