<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shelter Manager Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: 217 91% 60%; --destructive: 0 84% 60%;
      --border: 214 32% 91%; --muted: 215 16% 47%;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      min-height:100vh;
      background: linear-gradient(135deg, hsl(222 47% 11%) 0%, hsl(217 91% 25%) 100%);
      display:flex; align-items:center; justify-content:center; padding:1rem;
    }
    .login-card {
      background:white; border-radius:1rem; padding:2.5rem; width:100%; max-width:420px;
      box-shadow:0 25px 50px rgba(0,0,0,0.3);
    }
    .login-logo {
      width:56px; height:56px; border-radius:0.75rem;
      background:linear-gradient(135deg,hsl(217 91% 60%),hsl(271 81% 56%));
      display:flex; align-items:center; justify-content:center;
      color:white; font-weight:700; font-size:1.25rem; margin-bottom:1.5rem;
    }
    .login-title { font-size:1.5rem; font-weight:700; margin-bottom:0.25rem; }
    .login-sub { font-size:0.875rem; color:hsl(var(--muted)); margin-bottom:1.5rem; }
    .form-group { display:flex; flex-direction:column; gap:0.4rem; margin-bottom:1rem; }
    .form-label { font-size:0.875rem; font-weight:500; }
    .form-control {
      padding:0.625rem 0.875rem; border:1px solid hsl(var(--border)); border-radius:0.5rem;
      font-size:0.875rem; font-family:inherit; width:100%;
    }
    .form-control:focus { outline:none; border-color:hsl(var(--primary)); box-shadow:0 0 0 3px hsla(217,91%,60%,0.1); }
    .btn-login {
      width:100%; padding:0.75rem; border-radius:0.5rem;
      background:linear-gradient(135deg,hsl(217 91% 60%),hsl(271 81% 56%));
      color:white; border:none; font-size:1rem; font-weight:600;
      cursor:pointer; font-family:inherit; transition:all 0.2s;
    }
    .btn-login:hover { transform:translateY(-1px); box-shadow:0 4px 15px hsla(217,91%,60%,0.4); }
    .error-msg { background:#fee2e2; color:#991b1b; padding:0.625rem 0.875rem; border-radius:0.5rem; font-size:0.875rem; margin-bottom:1rem; }
    .vol-link { text-align:center; margin-top:1.25rem; font-size:0.8rem; color:hsl(var(--muted)); }
    .vol-link a { color:hsl(var(--primary)); text-decoration:none; font-weight:500; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">SM</div>
    <div class="login-title">Shelter Manager Portal</div>
    <div class="login-sub">Sign in to manage your assigned shelters</div>

    {% if messages %}
      {% for msg in messages %}
      <div class="error-msg">{{ msg }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Your username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Your password" required>
      </div>
      <button type="submit" class="btn-login">Sign In</button>
    </form>

    <div class="vol-link">
      Are you a volunteer? <a href="{% url 'volunteer_login' %}">Use Volunteer Login →</a>
    </div>
  </div>
</body>
</html>
